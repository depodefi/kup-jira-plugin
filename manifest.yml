modules:
  jira:dashboardGadget:
    - key: compliance-overview-gadget
      title: Compliance Overview
      description: High-level compliance status across Jira projects.
      thumbnail: https://developer.atlassian.com/platform/forge/images/icons/issue-panel-icon.svg
      resource: main
      resolver:
        function: resolver
      edit:
        resource: main

    - key: compliance-details-gadget
      title: Compliance Details
      description: Detailed per-issue compliance breakdown and reporting.
      thumbnail: https://developer.atlassian.com/platform/forge/images/icons/issue-panel-icon.svg
      resource: main
      resolver:
        function: resolver
      edit:
        resource: main
  jira:adminPage:
    - key: kup-admin-settings
      title: KUP 50% Configuration
      resource: admin-ui
      render: native
      resolver:
        function: adminResolver
  jira:issueContext:
    - key: kup-compliance-panel
      title: KUP Compliance
      label: KUP Compliance
      resource: kup-panel-ui
      render: native
      resolver:
        function: kupPanelResolver
  function:
    - key: resolver
      handler: index.handler
    - key: adminResolver
      handler: index.adminHandler
    - key: kupPanelResolver
      handler: index.kupPanelHandler
resources:
  - key: main
    path: static/hello-world/build
  - key: admin-ui
    path: src/admin-ui/index.jsx
  - key: kup-panel-ui
    path: src/kup-panel-ui/index.jsx
permissions:
  scopes:
    - storage:app
    - read:jira-work
    - write:jira-work
  content:
    styles:
      - unsafe-inline
app:
  runtime:
    name: nodejs24.x
    memoryMB: 256
    architecture: arm64
  id: ari:cloud:ecosystem::app/a8161fad-fc13-466f-aa28-6f264f00b396
