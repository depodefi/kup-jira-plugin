modules:
  jira:globalPage:
    - key: kup-report-page
      title: KUP Compliance
      resource: kup-global-ui
      render: native
      resolver:
        function: managerResolver
      route: kup
  jira:adminPage:
    - key: kup-admin-settings
      title: KUP 50% Configuration
      resource: admin-ui
      render: native
      resolver:
        function: adminResolver
  jira:entityProperty:
    - key: kup-data-indexing
      entity: issue
      propertyKey: kup-data
      values:
        - path: kupMonth
          type: string
        - path: kupHours
          type: number
    - key: kup-approval-indexing
      entity: issue
      propertyKey: kup-approval
      values:
        - path: status
          type: string
  jira:issueContext:
    - key: kup-compliance-panel
      title: KUP Compliance
      label: KUP Compliance
      resource: kup-panel-ui
      render: native
      resolver:
        function: kupPanelResolver
  function:
    - key: adminResolver
      handler: index.adminHandler
    - key: kupPanelResolver
      handler: index.kupPanelHandler
    - key: kupReportResolver
      handler: index.kupReportHandler
    - key: managerResolver
      handler: index.managerHandler
resources:
  - key: admin-ui
    path: src/admin-ui/index.jsx
  - key: kup-panel-ui
    path: src/kup-panel-ui/index.jsx
  - key: kup-global-ui
    path: src/kup-global-ui/index.jsx
permissions:
  scopes:
    - storage:app
    - read:jira-work
    - write:jira-work
    - read:jira-user
    - manage:jira-configuration
  content:
    styles:
      - unsafe-inline
app:
  runtime:
    name: nodejs24.x
    memoryMB: 256
    architecture: arm64
  id: ari:cloud:ecosystem::app/a8161fad-fc13-466f-aa28-6f264f00b396
